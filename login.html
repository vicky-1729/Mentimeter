<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - Mentimeter</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="navbar">
        <div class="navbar-container">
            <a href="index.html" class="logo">Mentimeter</a>
            <a href="signup.html" class="btn-signup">Sign Up</a>
        </div>
    </div>

    <div class="container" style="max-width: 400px; margin-top: 4rem;">
        <div class="form-card">
            <h1 style="text-align: center; margin-bottom: 1rem;">Welcome Back</h1>
            <p style="text-align: center; color: var(--text-light); margin-bottom: 2rem;">Sign in to your account</p>

            <form id="login-form">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="your@email.com" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn-primary" style="width: 100%;">Sign In</button>
            </form>

            <div style="text-align: center; margin: 2rem 0; color: var(--text-light);">or continue with</div>

            <div style="display: flex; gap: 1rem;">
                <button id="google" type="button" class="btn-secondary" style="flex: 1;">Google</button>
                <button id="outlook" type="button" class="btn-secondary" style="flex: 1;">Outlook</button>
            </div>

            <p style="text-align: center; margin-top: 2rem; color: var(--text-light);">
                Don't have an account? <a href="signup.html" style="color: var(--primary); text-decoration: none; font-weight: 600;">Sign up</a>
            </p>
        </div>
    </div>

    <script src="app-config.js"></script>
    <script src="auth-service.js"></script>
    <script src="login.js"></script>
</body>
</html>
        <h4>Forgot password?</h4>
    <p>New to Mentimeter?<span id="sp">Sign up now</span></p>
</form>
   </div>
</body>
</html>
<script src="app-config.js"></script>
<script src="auth-service.js"></script>
<script src="login.js"></script>
