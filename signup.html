<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Mentimeter</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="navbar">
        <div class="navbar-container">
            <a href="index.html" class="logo">Mentimeter</a>
            <a href="login.html" class="btn-login">Sign In</a>
        </div>
    </div>

    <div class="container" style="max-width: 400px; margin-top: 4rem;">
        <div class="form-card">
            <h1 style="text-align: center; margin-bottom: 1rem;">Create Your Account</h1>
            <p style="text-align: center; color: var(--text-light); margin-bottom: 2rem;">Start creating interactive presentations today</p>

            <form id="signup-form">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="your@email.com" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="At least 8 characters" required>
                </div>

                <div class="form-group">
                    <label for="confirm-password">Confirm Password</label>
                    <input type="password" id="confirm-password" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn-primary" style="width: 100%;">Create Account</button>
            </form>

            <div style="text-align: center; margin: 2rem 0; color: var(--text-light);">or sign up with</div>

            <div style="display: flex; gap: 1rem;">
                <button id="google" type="button" class="btn-secondary" style="flex: 1;">Google</button>
                <button id="outlook" type="button" class="btn-secondary" style="flex: 1;">Outlook</button>
            </div>

            <p style="text-align: center; margin-top: 2rem; color: var(--text-light);">
                Already have an account? <a href="login.html" style="color: var(--primary); text-decoration: none; font-weight: 600;">Sign in</a>
            </p>
        </div>
    </div>

    <script src="app-config.js"></script>
    <script src="auth-service.js"></script>
    <script src="signup.js"></script>
</body>
</html>
