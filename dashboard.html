<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Mentimeter</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="navbar">
        <div class="navbar-container">
            <div class="logo">Mentimeter</div>
            <div class="nav-links">
                <a href="dashboard.html" class="active">Presentations</a>
                <a href="#" id="user-name"></a>
                <button id="logout-btn" class="btn-logout">Sign Out</button>
            </div>
        </div>
    </div>

    <div class="container dashboard-container">
        <div class="dashboard-header">
            <h1>My Presentations</h1>
            <a href="create-presentation.html" class="btn-primary">+ Create New</a>
        </div>

        <div id="presentations-list" class="presentations-grid">
            <!-- Presentations will load here -->
        </div>

        <div id="empty-state" class="empty-state" style="display: none;">
            <div class="empty-icon">📽️</div>
            <h2>No Presentations Yet</h2>
            <p>Create your first interactive presentation to engage your audience</p>
            <a href="create-presentation.html" class="btn-primary">Create Your First Presentation</a>
        </div>
    </div>

    <script src="app-config.js"></script>
    <script src="auth-service.js"></script>
    <script>
        let userEmail = null;
        let presentations = [];

        async function initDashboard() {
            const token = localStorage.getItem('auth_token');
            if (!token) {
                window.location.href = 'login.html';
                return;
            }

            userEmail = localStorage.getItem('user_email');
            document.getElementById('user-name').textContent = userEmail;

            await loadPresentations();
        }

        async function loadPresentations() {
            try {
                const response = await fetch(`${API_BASE_URL}/presentations`, {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${localStorage.getItem('auth_token')}`
                    }
                });

                if (response.ok) {
                    presentations = await response.json();
                    renderPresentations();
                } else if (response.status === 404) {
                    document.getElementById('empty-state').style.display = 'block';
                }
            } catch (error) {
                console.error('Error loading presentations:', error);
                document.getElementById('empty-state').style.display = 'block';
            }
        }

        function renderPresentations() {
            const container = document.getElementById('presentations-list');
            
            if (presentations.length === 0) {
                document.getElementById('empty-state').style.display = 'block';
                return;
            }

            container.innerHTML = presentations.map(pres => `
                <div class="presentation-card">
                    <div class="presentation-preview">
                        <div class="slide-count">${pres.slides?.length || 0} slides</div>
                    </div>
                    <h3>${pres.title}</h3>
                    <p class="presentation-desc">${pres.description || 'No description'}</p>
                    <div class="presentation-actions">
                        <a href="editor.html?id=${pres.id}" class="btn-secondary btn-small">Edit</a>
                        <a href="presenter.html?id=${pres.id}" class="btn-primary btn-small">Present</a>
                        <button onclick="deletePresentation('${pres.id}')" class="btn-danger btn-small">Delete</button>
                    </div>
                    <div class="presentation-meta">
                        <span>Created: ${new Date(pres.created_at).toLocaleDateString()}</span>
                    </div>
                </div>
            `).join('');
        }

        async function deletePresentation(id) {
            if (!confirm('Are you sure you want to delete this presentation?')) return;

            try {
                const response = await fetch(`${API_BASE_URL}/presentations/${id}`, {
                    method: 'DELETE',
                    headers: {
                        'Authorization': `Bearer ${localStorage.getItem('auth_token')}`
                    }
                });

                if (response.ok) {
                    await loadPresentations();
                }
            } catch (error) {
                console.error('Error deleting presentation:', error);
            }
        }

        document.getElementById('logout-btn').addEventListener('click', () => {
            localStorage.removeItem('auth_token');
            localStorage.removeItem('user_email');
            window.location.href = 'login.html';
        });

        initDashboard();
    </script>
</body>
</html>
