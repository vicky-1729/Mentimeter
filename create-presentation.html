<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Presentation - Mentimeter</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="navbar">
        <div class="navbar-container">
            <div class="logo">Mentimeter</div>
            <a href="dashboard.html" class="btn-back">← Back to Dashboard</a>
        </div>
    </div>

    <div class="container">
        <div class="form-card">
            <h1>Create New Presentation</h1>
            
            <form id="create-form">
                <div class="form-group">
                    <label for="title">Presentation Title *</label>
                    <input type="text" id="title" placeholder="My Interactive Presentation" required>
                </div>

                <div class="form-group">
                    <label for="description">Description</label>
                    <textarea id="description" placeholder="Add a description for your presentation..." rows="4"></textarea>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn-primary">Create & Start Editing</button>
                    <a href="dashboard.html" class="btn-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>

    <script src="app-config.js"></script>
    <script>
        document.getElementById('create-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const title = document.getElementById('title').value;
            const description = document.getElementById('description').value;

            try {
                const response = await fetch(`${API_BASE_URL}/presentations`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${localStorage.getItem('auth_token')}`
                    },
                    body: JSON.stringify({
                        title,
                        description,
                        slides: []
                    })
                });

                if (response.ok) {
                    const data = await response.json();
                    window.location.href = `editor.html?id=${data.id}`;
                } else {
                    alert('Failed to create presentation');
                }
            } catch (error) {
                console.error('Error creating presentation:', error);
                alert('Error creating presentation');
            }
        });
    </script>
</body>
</html>
